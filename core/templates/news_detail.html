{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ news.title }} | Notícias HJE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Teko:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'imgs/HJE2.ico' %}">
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&
    family=Exo+2:wght@400;500;600;700&
    family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body style="background: #050a1e;">

    <style>

        body {
            background: 
                radial-gradient(circle at 20% 30%, rgba(65,105,225,0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(123,104,238,0.12), transparent 40%),
                #050a1e;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
        
            display: flex;
            align-items: center;
            justify-content: center;
        
            background: rgba(5, 10, 30, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        
            padding: 20px;
        }
        
        .modal-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
        
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
        
            overflow-y: auto;

            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .modal-header {
            width: 100%;
            height: 260px;
            background-size: cover;
            background-position: center;
            border-radius: 24px 24px 0 0;
        }
        
        .modal-body {
            padding: 32px 36px 36px;
        }
        
        .modal-body h2 {
            font-family: 'Teko', sans-serif;
            font-size: 38px;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 14px;
            color: #fff;
        }
        
        .modal-body p {
            font-size: 17px;
            line-height: 1.7;
            opacity: 0.9;
        }
        
        .modal-cta {
            display: inline-block;
            background: linear-gradient(135deg, #4169e1, #7b68ee);
            color: #fff;
            padding: 10px 22px;
            border-radius: 10px;
            text-decoration: none;
            font-family: 'Teko', sans-serif;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: 0.2s;
        }
        
        .modal-cta:hover {
            opacity: 0.85;
            transform: translateY(-2px);
        }

        .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 28px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
        }

        
    </style>

    <!-- CONTEÚDO -->
    <div class="modal-overlay active">

        <div class="modal-glass" style="max-width: 800px; width: 95%;">
            <span class="close-btn" onclick="window.history.back()">&times;</span>
    
            {% if news.image %}
            <div class="modal-header" style="background-image: url('{{ news.image.url }}');"></div>
            {% endif %}
    
            <div class="modal-body">
    
                <h2>{{ news.title }}</h2>
    
                {% if news.created_at %}
                    <p style="opacity: 0.6; font-size: 14px; margin-bottom: 20px;">
                        Publicado em {{ news.created_at|date:"d/m/Y" }}
                    </p>
                {% endif %}
    
                <p style="font-size: 17px; line-height: 1.7; opacity: 0.9;">
                    {{ news.content|linebreaks }}
                </p>
    
                <div style="margin-top: 30px; display: flex; gap: 16px; flex-wrap: wrap;">
    
                    <a href="/" class="modal-cta" style="background: transparent; border: 1px solid rgba(65,105,225,0.5);">
                        ← Home
                    </a>
    
                    {% if news.external_link %}
                    <a href="{{ news.external_link }}" target="_blank" class="modal-cta">
                        🔗 Acessar link
                    </a>
                    {% endif %}
    
                </div>
    
            </div>
        </div>
    </div>

</body>
</html>
